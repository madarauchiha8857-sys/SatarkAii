
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astra v25.0 | Astra Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-dark: #000000;
            --saffron: #FF9933;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --slider-bg: #ffffff;
            --slider-handle: #2d3748;
            --slider-icon: #facc15;
            --slider-text: #cbd5e1;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: white; overflow: hidden; height: 100vh; width: 100vw; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(255, 153, 51, 0.08) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.05) 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        /* --- Opening Animation Fix --- */
        @keyframes textAppear {
            0% { opacity: 0; transform: scale(0.9); filter: blur(10px); letter-spacing: 0.3em; }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); letter-spacing: 0.15em; }
        }
        @keyframes lineGlowPass {
            0% { width: 0; left: 50%; opacity: 0; }
            20% { width: 0; left: 50%; opacity: 1; }
            50% { width: 100%; left: 0; opacity: 1; }
            80% { width: 0; left: 50%; opacity: 1; }
            100% { width: 0; left: 50%; opacity: 0; }
        }
        .opening-name-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90vw; max-width: 400px; }
        .opening-name { font-size: clamp(1.2rem, 6vw, 1.8rem); font-weight: 900; text-transform: uppercase; color: white; opacity: 0; text-align: center; animation: textAppear 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s; white-space: nowrap; }
        .glow-line { position: absolute; bottom: -15px; height: 2px; background: linear-gradient(90deg, transparent, var(--saffron), var(--gold), var(--saffron), transparent); box-shadow: 0 0 15px var(--saffron); animation: lineGlowPass 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* --- Refined Waves (No Lag) --- */
        .logo-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 150px; height: 150px; }
        .logo-static, .wave-container { position: absolute; transition: opacity 0.4s ease, transform 0.4s ease; will-change: opacity, transform; }
        .wave-container { display: flex; align-items: center; justify-content: center; gap: 6px; opacity: 0; pointer-events: none; transform: scale(0.8); }
        .is-speaking .logo-static { opacity: 0; pointer-events: none; transform: scale(0.7); }
        .is-speaking .wave-container { opacity: 1; pointer-events: auto; transform: scale(1.1); }
        .wave-bar { width: 5px; background: linear-gradient(to top, var(--saffron), var(--gold)); border-radius: 10px; height: 10px; animation: waveAnim 0.5s infinite ease-in-out; }
        @keyframes waveAnim { 0%, 100% { height: 12px; } 50% { height: 60px; } }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; } .wave-bar:nth-child(3) { animation-delay: 0.2s; } .wave-bar:nth-child(4) { animation-delay: 0.15s; } .wave-bar:nth-child(5) { animation-delay: 0.25s; }

        /* --- Components --- */
        .glass-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 40px; }
        .input-wrap { position: relative; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 12px 24px; transition: all 0.4s ease; }
        .input-wrap:focus-within { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 153, 51, 0.4); }
        .btn-modern { background: #ffffff; color: #000000; border-radius: 24px; font-weight: 800; transition: all 0.3s ease; }
        .send-btn { width: 48px; height: 48px; background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #000000; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }

        /* --- Image-Style Slider --- */
        .slider-track { background: var(--slider-bg); border-radius: 50px; height: 64px; position: relative; width: 100%; overflow: hidden; }
        .slider-handle { width: 56px; height: 56px; background: var(--slider-handle); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; left: 4px; top: 4px; color: var(--slider-icon); cursor: grab; z-index: 10; touch-action: none; }
        .slider-text { position: absolute; width: 100%; text-align: center; line-height: 64px; font-size: 10px; font-weight: 800; color: var(--slider-text); text-transform: uppercase; letter-spacing: 3px; pointer-events: none; }

        .ai-bubble { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px 30px 30px 10px; padding: 20px; font-size: 15px; line-height: 1.6; max-width: 88%; }
        .user-bubble { background: linear-gradient(135deg, var(--saffron), #ff5e00); border-radius: 30px 30px 10px 30px; padding: 16px 22px; max-width: 82%; font-weight: 700; }

        section { transition: opacity 0.8s ease, transform 0.8s ease; }
        .section-hidden { display: none !important; opacity: 0; transform: scale(1.05); pointer-events: none; }

        .star-path { fill: url(#divineGrad); }
        .logo-anim { animation: float 6s infinite ease-in-out; filter: drop-shadow(0 0 15px rgba(255, 153, 51, 0.3)); }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <linearGradient id="divineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FF9933" />
                <stop offset="100%" stop-color="#FFD700" />
            </linearGradient>
        </defs>
    </svg>

    <!-- 1. SPLASH -->
    <section id="splash" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-[300]">
        <div class="opening-name-container">
            <h1 class="opening-name">ASTRA INTELLIGENCE</h1>
            <div class="glow-line"></div>
        </div>
    </section>

    <!-- 2. LOGIN -->
    <section id="onboarding" class="section-hidden fixed inset-0 flex flex-col items-center justify-center px-6 z-[200]">
        <div class="w-full max-w-sm flex flex-col items-center">
            <div class="mb-10 text-center">
                <h2 class="text-3xl font-black tracking-tighter mb-1">Astra Intelligence</h2>
                <p class="text-white/30 text-[10px] uppercase font-bold tracking-[0.3em]">Initialize Secure Session</p>
            </div>
            <div class="w-full space-y-4">
                <div class="input-wrap">
                    <label class="block text-[9px] uppercase font-black text-orange-500/60 tracking-widest mb-1 ml-1">Login Name</label>
                    <input type="text" id="userName" placeholder="Full Legal Name" class="w-full bg-transparent border-none outline-none text-[15px] font-semibold">
                </div>
                <div class="input-wrap">
                    <label class="block text-[9px] uppercase font-black text-orange-500/60 tracking-widest mb-1 ml-1">Secure Contact</label>
                    <input type="tel" id="userMobile" placeholder="+91 ••••• •••••" class="w-full bg-transparent border-none outline-none text-[15px] font-semibold">
                </div>
                <button onclick="handleLogin()" class="btn-modern w-full p-6 text-[11px] uppercase tracking-[0.3em] mt-6">Connect Portal</button>
            </div>
            <div class="mt-12 opacity-20 text-[9px] font-bold uppercase tracking-[0.5em]">Subject to IPC Section 209</div>
        </div>
    </section>

    <!-- 3. HOME -->
    <section id="home" class="section-hidden fixed inset-0 flex flex-col items-center justify-center p-8 bg-black z-[150]">
        <div class="flex-1 flex flex-col items-center justify-center w-full">
            <div class="logo-wrapper mb-12">
                <div class="logo-static">
                    <svg width="150" height="150" viewBox="0 0 24 24" fill="none" class="logo-anim">
                        <path class="star-path" d="M12 2L14.85 9.15L22 12L14.85 14.85L12 22L9.15 14.85L2 12L9.15 9.15L12 2Z" />
                    </svg>
                </div>
                <div class="wave-container">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>
            </div>
            <h1 class="text-4xl font-black tracking-tighter mb-2 text-center">Astra Intelligence</h1>
            <p class="text-orange-500 font-bold text-[10px] uppercase tracking-[0.5em] opacity-80 mb-16">Secure Portal</p>
            <div class="w-full max-w-sm">
                <div class="slider-track" id="homeTrack">
                    <div class="slider-text">Slide to start case</div>
                    <div class="slider-handle" id="homeHandle"><i data-lucide="chevron-right" class="w-8 h-8"></i></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 4. CHAT PORTAL -->
    <section id="portal" class="section-hidden fixed inset-0 flex flex-col bg-black z-[250]">
        <!-- TRULY TRANSPARENT HEADER: NO STRIP, NO BG -->
        <div class="p-8 flex justify-between items-center bg-transparent">
            <div class="flex items-center gap-4">
                <div class="logo-wrapper !w-10 !h-10 scale-50">
                   <div class="logo-static">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path class="star-path" d="M12 2L14.85 9.15L22 12L14.85 14.85L12 22L9.15 14.85L2 12L9.15 9.15L12 2Z" />
                        </svg>
                   </div>
                   <div class="wave-container"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
                </div>
                <h3 class="text-base font-black tracking-tight text-white/90">Astra Intelligence</h3>
            </div>
            <!-- X button only -->
            <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center active:scale-90 transition-all">
                <i data-lucide="x" class="w-6 h-6 text-white/70"></i>
            </button>
        </div>
        <div id="chatBox" class="flex-1 overflow-y-auto p-8 space-y-8 no-scrollbar"></div>
        <div class="p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="glass-card p-2 px-3 flex items-center gap-4 border-white/10">
                <input type="text" id="userInput" placeholder="" class="flex-1 bg-transparent border-none outline-none text-[16px] p-3 font-semibold">
                <button onclick="sendMessage()" class="send-btn"><i data-lucide="arrow-up-right" class="w-6 h-6"></i></button>
            </div>
        </div>
    </section>

    <!-- 5. DRAFT -->
    <section id="draftView" class="section-hidden fixed inset-0 bg-black z-[400] flex flex-col p-8 overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center mb-10 pt-4"><h2 class="text-3xl font-black tracking-tighter">Case Briefing</h2><button onclick="closeDraft()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center"><i data-lucide="x"></i></button></div>
        <div id="draftContent" class="glass-card p-10 text-white/80 font-serif text-sm leading-relaxed mb-10 border-orange-500/10 whitespace-pre-wrap"></div>
        <div class="w-full mb-12">
            <div class="slider-track" id="submitTrack">
                <div class="slider-text">Slide to Dispatch</div>
                <div class="slider-handle" id="submitHandle"><i data-lucide="send" class="w-7 h-7"></i></div>
            </div>
        </div>
    </section>

    <script>
        let user = { name: '', mobile: '', uid: 'AST-' + Math.floor(Math.random() * 900000 + 100000) };
        let currentStep = 'category';
        let caseData = {};
        
        function showSection(id) {
            const sections = ['splash', 'onboarding', 'home', 'portal', 'draftView'];
            sections.forEach(s => {
                const el = document.getElementById(s);
                if (s === id) {
                    el.classList.remove('section-hidden');
                    el.style.display = (['portal', 'onboarding', 'home', 'splash'].includes(s)) ? 'flex' : 'block';
                } else { el.classList.add('section-hidden'); el.style.display = 'none'; }
            });
        }

        function goBack() { 
            showSection('home'); currentStep = 'category'; caseData = {}; document.getElementById('chatBox').innerHTML = ''; 
            if(window.speechSynthesis) window.speechSynthesis.cancel(); document.body.classList.remove('is-speaking'); 
            resetSlider('homeHandle');
        }

        function resetSlider(handleId) {
            const h = document.getElementById(handleId);
            if(h) { h.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)'; h.style.transform = 'translateX(0px)'; }
        }

        window.onload = () => { 
            lucide.createIcons(); 
            setTimeout(() => showSection('onboarding'), 3000); 
            setupSlider('homeHandle', 'homeTrack', engagePortal);
            setupSlider('submitHandle', 'submitTrack', submitCase);
        };

        function handleLogin() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userMobile').value.trim();
            if (name && phone.length >= 10) {
                user.name = name; user.mobile = phone; showSection('home');
                speak(`Hello ${user.name}. Welcome to Astra Intelligence. We are your dedicated secure portal for resolving legal grievances. Please note: Submitting a false legal complaint is a criminal offense under IPC Section 209. You will be liable for prosecution if you provide fake information. Proceed with integrity.`);
            } else { document.getElementById('onboarding').style.animation = 'shake 0.4s'; setTimeout(() => document.getElementById('onboarding').style.animation = '', 400); }
        }

        function setupSlider(handleId, trackId, onComplete) {
            const handle = document.getElementById(handleId), track = document.getElementById(trackId);
            let isDragging = false, startX = 0;
            const start = (e) => { isDragging = true; startX = (e.touches ? e.touches[0].clientX : e.clientX); handle.style.transition = 'none'; };
            const move = (e) => {
                if (!isDragging) return;
                const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
                let delta = clientX - startX;
                const max = track.offsetWidth - handle.offsetWidth - 8;
                if (delta < 0) delta = 0; if (delta > max) delta = max;
                handle.style.transform = `translateX(${delta}px)`;
                if (delta >= max) { isDragging = false; onComplete(); }
            };
            const end = () => { if (!isDragging) return; isDragging = false; handle.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)'; handle.style.transform = 'translateX(0px)'; };
            handle.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
            handle.addEventListener('touchstart', start, {passive: true}); window.addEventListener('touchmove', move, {passive: false}); window.addEventListener('touchend', end);
        }

        function engagePortal() { showSection('portal'); addMessage('ai', `Welcome ${user.name}, Astra session ${user.uid} initialized. Specify sector: [Consumer] or [Cyber]?`); }

        function addMessage(sender, text) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = sender === 'ai' ? 'flex justify-start' : 'flex justify-end';
            div.innerHTML = `<div class="${sender === 'ai' ? 'ai-bubble' : 'user-bubble'}">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            if (sender === 'ai') speak(text);
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim(); if (!msg) return;
            addMessage('user', msg); input.value = '';
            processAstraLogic(msg);
        }

        function processAstraLogic(input) {
            const query = input.toLowerCase();
            if (currentStep === 'category') {
                if (query.includes('consumer')) { 
                    caseData.category = 'Consumer'; currentStep = 'collect'; caseData.stepIndex = 0;
                    caseData.questions = [
                        { key: 'company', q: "Name of the Opposite Party (Company Name)?" },
                        { key: 'order_id', q: "Order ID or Invoice Number?" },
                        { key: 'amount', q: "Total transaction value in INR?" },
                        { key: 'issue', q: "Describe the deficiency in service in detail." },
                        { key: 'relief', q: "What relief do you seek? (Refund / Replacement / Compensation)?" },
                        { key: 'comp_amt', q: "Total amount sought as compensation?" }
                    ];
                    addMessage('ai', `Consumer Audit active. ${caseData.questions[0].q}`);
                } else if (query.includes('cyber')) {
                    caseData.category = 'Cyber'; currentStep = 'cyber_type';
                    addMessage('ai', "Specify incident: [Money Fraud], [Online Abuse], [Child Safety], or [Online Harassment]?");
                } else { addMessage('ai', "Select [Consumer] or [Cyber]."); }
                return;
            }
            if (currentStep === 'cyber_type') {
                const types = { money: 'Money Fraud', abuse: 'Online Abuse', child: 'Child Safety', harassment: 'Online Harassment' };
                let typeKey = Object.keys(types).find(k => query.includes(k));
                if (!typeKey) { addMessage('ai', "Choose a valid Cyber type."); return; }
                caseData.category = `Cyber (${types[typeKey]})`; currentStep = 'collect'; caseData.stepIndex = 0;
                caseData.questions = typeKey === 'money' ? [{ key: 'platform', q: "Platform? (Bank/UPI)" }, { key: 'txn_id', q: "Txn ID?" }, { key: 'loss', q: "Loss INR?" }, { key: 'method', q: "Method? (OTP/Link)" }, { key: 'events', q: "Events?" }] : [{ key: 'details', q: "Specify incident details and platform." }];
                addMessage('ai', `${types[typeKey]} protocol. ${caseData.questions[0].q}`);
                return;
            }
            if (currentStep === 'collect') {
                caseData[caseData.questions[caseData.stepIndex].key] = input;
                caseData.stepIndex++;
                if (caseData.stepIndex < caseData.questions.length) addMessage('ai', caseData.questions[caseData.stepIndex].q);
                else finalizeCase();
            }
        }

        function finalizeCase() {
            addMessage('ai', "Reviewing generated briefing...");
            setTimeout(() => {
                let briefing = `CASE SUMMARY [REF: ${user.uid}]\n--------------------------------\n`;
                caseData.questions.forEach(item => { briefing += `${item.key.toUpperCase()}: ${caseData[item.key]}\n`; });
                document.getElementById('draftContent').innerText = briefing;
                resetSlider('submitHandle'); showSection('draftView');
            }, 1800);
        }

        function speak(text) {
            if (!window.speechSynthesis) return; window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            const v = window.speechSynthesis.getVoices().find(v => v.lang.includes('IN') || v.name.includes('India'));
            if (v) utt.voice = v; utt.rate = 1.0;
            utt.onstart = () => { document.body.classList.add('is-speaking'); };
            utt.onend = () => { document.body.classList.remove('is-speaking'); };
            window.speechSynthesis.speak(utt);
        }

        function closeDraft() { showSection('portal'); }
        function submitCase() { 
            window.location.href = `mailto:consumerhelpsupport@gmail.com?subject=${encodeURIComponent(caseData.category + ' - ' + user.uid)}&body=${encodeURIComponent(document.getElementById('draftContent').innerText)}`; 
            addMessage('ai', "Dispatch successful."); closeDraft(); 
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
